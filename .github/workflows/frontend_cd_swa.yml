name: Frontend CD (SWA)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: NeighborGoods.Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: NeighborGoods.Frontend
        run: npm ci

      - name: Build frontend
        working-directory: NeighborGoods.Frontend
        env:
          VITE_API_BASE_URL: ${{ vars.VITE_API_BASE_URL }}
          VITE_SIGNALR_BASE_URL: ${{ vars.VITE_SIGNALR_BASE_URL }}
        run: |
          test -n "$VITE_API_BASE_URL" || (echo "Missing secret: VITE_API_BASE_URL" && exit 1)
          test -n "$VITE_SIGNALR_BASE_URL" || (echo "Missing secret: VITE_SIGNALR_BASE_URL" && exit 1)
          npm run build

      - name: Deploy frontend to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          action: upload
          app_location: NeighborGoods.Frontend
          output_location: dist
