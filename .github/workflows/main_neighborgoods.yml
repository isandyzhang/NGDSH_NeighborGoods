# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy ASP.Net Core app to Azure Web App - NeighborGoods

on:
  workflow_dispatch:
  pull_request:
    paths:
      - 'NeighborGoods.Api/**'
      - 'NeighborGoods.Api.Tests/**'
      - '.github/workflows/main_neighborgoods.yml'
  push:
    branches:
      - main
    paths:
      - 'NeighborGoods.Api/**'
      - 'NeighborGoods.Api.Tests/**'
      - '.github/workflows/main_neighborgoods.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore

      - name: Build tests
        run: dotnet build "NeighborGoods.Api.Tests/NeighborGoods.Api.Tests.csproj" --configuration Release --no-restore

      - name: Run API integration tests
        run: dotnet test "NeighborGoods.Api.Tests/NeighborGoods.Api.Tests.csproj" --configuration Release --no-build

  build:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Build with dotnet
        run: dotnet build --configuration Release

      - name: dotnet publish
        run: dotnet publish -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_1308AD118F7C43A0ADDB1EDE577AC3B9 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_2C47844AB171412B8A64D93BC6874AF4 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_515967424120491AA2C192D6B12558FF }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'NeighborGoods'
          package: .

          
