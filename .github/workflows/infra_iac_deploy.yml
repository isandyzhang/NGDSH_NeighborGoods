name: IaC Deploy

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI Bicep
        run: az bicep install

      - name: Deploy Bicep infrastructure
        run: |
          extra_params=()
          if [ -n "${{ secrets.CONTAINER_IMAGE }}" ]; then
            extra_params+=(--parameters "containerImage=${{ secrets.CONTAINER_IMAGE }}")
          fi

          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/deploy.bicep \
            --parameters infra/bicep/deploy.parameters.prod.json \
            --parameters existingSqlConnectionString="${{ secrets.AZURE_SQL_CONNECTION_STRING }}" \
            --parameters existingBlobConnectionString="${{ secrets.AZURE_BLOB_CONNECTION_STRING }}" \
            --parameters sqlAdminLogin="${{ secrets.AZURE_SQL_ADMIN_LOGIN }}" \
            --parameters sqlAdminPassword="${{ secrets.AZURE_SQL_ADMIN_PASSWORD }}" \
            --parameters lineOidcChannelId="${{ secrets.LINE_OIDC_CHANNEL_ID }}" \
            --parameters lineOidcChannelSecret="${{ secrets.LINE_OIDC_CHANNEL_SECRET }}" \
            --parameters lineMessagingChannelId="${{ secrets.LINE_MESSAGING_CHANNEL_ID }}" \
            --parameters lineMessagingChannelAccessToken="${{ secrets.LINE_MESSAGING_CHANNEL_ACCESS_TOKEN }}" \
            --parameters lineMessagingChannelSecret="${{ secrets.LINE_MESSAGING_CHANNEL_SECRET }}" \
            --parameters lineMessagingBotId="${{ secrets.LINE_MESSAGING_BOT_ID }}" \
            --parameters jwtSigningKey="${{ secrets.JWT_SIGNING_KEY }}" \
            "${extra_params[@]}"
