name: infra_bicep

on:
  push:
    branches:
      - main
    paths:
      - 'infra/bicep/**'
      - '.github/workflows/infra_bicep.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'infra/bicep/**'
      - '.github/workflows/infra_bicep.yml'
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI Bicep
        run: az bicep install

      - name: Validate Bicep infrastructure
        run: |
          az deployment group validate \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/deploy.bicep \
            --parameters infra/bicep/deploy.parameters.json

  deploy:
    if: github.event_name == 'workflow_dispatch'
    needs: validate
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
      id-token: write

    steps:
      - uses: actions/checkout@v4

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure CLI Bicep
        run: az bicep install

      - name: Deploy Bicep infrastructure
        run: |
          az deployment group create \
            --resource-group ${{ secrets.AZURE_RESOURCE_GROUP }} \
            --template-file infra/bicep/deploy.bicep \
            --parameters infra/bicep/deploy.parameters.json
