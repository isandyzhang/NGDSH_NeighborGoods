name: Frontend CI

on:
  push:
    branches:
      - main
    paths:
      - 'NeighborGoods.Frontend/**'
      - '.github/workflows/frontend_ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'NeighborGoods.Frontend/**'
      - '.github/workflows/frontend_ci.yml'
  
jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: NeighborGoods.Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: NeighborGoods.Frontend
        run: npm ci

      - name: Run frontend tests (if present)
        working-directory: NeighborGoods.Frontend
        run: npm run test --if-present

      - name: Build frontend
        working-directory: NeighborGoods.Frontend
        run: npm run build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: NeighborGoods.Frontend/dist


